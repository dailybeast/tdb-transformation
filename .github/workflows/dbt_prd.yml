name: dbt Prod

on:
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'seeds/**'
      - 'dbt_project.yml'
      - 'packages.yml'
  schedule:
    - cron: '0 10 * * *'  # Daily at 10:00 UTC — adjust to run after acquisition jobs complete
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  dbt-prod:
    name: dbt build (prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-bigquery==1.10.2

      - name: Install dbt packages
        run: dbt deps
        env:
          DBT_PROFILES_DIR: .

      - name: Check source freshness
        run: dbt source freshness
        env:
          DBT_PROFILES_DIR: .
          GCP_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: dbt build (prod)
        run: dbt build --target prod
        env:
          DBT_PROFILES_DIR: .
          GCP_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}