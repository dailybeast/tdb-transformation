version: 2

sources:
  - name: raw_landing
    database: data-platform-455517
    schema: raw_landing
    description: Raw JSON payloads landed from the Substack acquisition script.

    tables:
      - name: substack___post_overview
        description: >
          One row per post per snapshot date. Contains the full Substack dashboard
          overview tab payload including post metadata, email delivery stats,
          engagement counts, subscription-driven metrics, comp benchmarks,
          and referrer source summary.
        config:
          loaded_at_field: snapshot_date
          freshness:
            warn_after: {count: 10, period: day}
        columns:
          - name: post_id
            description: Substack post ID.
            tests:
              - not_null
          - name: snapshot_date
            description: Date the payload was captured by the acquisition script.
            tests:
              - not_null
          - name: data
            description: Raw JSON payload from the Substack overview endpoint, serialized as a STRING via json.dumps(). Parsed with PARSE_JSON() in staging.
            tests:
              - not_null

      - name: substack___subscribers_snapshot
        description: >
          Full export of paid subscribers per snapshot date. One row per snapshot —
          subscriber records are nested in a sub STRUCT and flattened in staging.
        config:
          loaded_at_field: snapshot_date
          freshness:
            warn_after: {count: 10, period: day}
        columns:
          - name: snapshot_date
            description: Timestamp when the subscriber list was captured.
            tests:
              - not_null
          - name: sub
            description: STRUCT containing subscriber and subscription fields.

      - name: substack___post_growth
        description: >
          One row per post per snapshot date. Contains nested totals and user arrays
          for subscribes, signups, and unsubscribes attributed to each post.
          User arrays are dropped in staging — only totals are surfaced.
        config:
          loaded_at_field: snapshot_date
          freshness:
            warn_after: {count: 10, period: day}
        columns:
          - name: post_id
            description: Substack post ID.
            tests:
              - not_null
          - name: snapshot_date
            description: UTC timestamp when this payload was captured.
            tests:
              - not_null
          - name: data
            description: Raw JSON payload serialized as a STRING via json.dumps(). Parsed with PARSE_JSON() in staging.

      - name: substack___post_comments
        description: >
          One row per comment per snapshot date. Includes top-level comments and replies.
          Body is plain text, suitable for LLM use cases.
        config:
          loaded_at_field: snapshot_date
          freshness:
            warn_after: {count: 10, period: day}
        columns:
          - name: comment_id
            description: Unique comment identifier.
            tests:
              - not_null
          - name: post_id
            description: The post this comment belongs to.
            tests:
              - not_null
          - name: snapshot_date
            description: UTC timestamp when this comment was captured.
            tests:
              - not_null

      - name: substack___post_traffic
        description: >
          One row per post per snapshot date. Contains nested arrays for referrers,
          devices, and categories. Pivoted into a wide post-grain format in staging.
        config:
          loaded_at_field: snapshot_date
          freshness:
            warn_after: {count: 10, period: day}
        columns:
          - name: post_id
            description: Substack post ID.
            tests:
              - not_null
          - name: snapshot_date
            description: UTC timestamp when this payload was captured.
            tests:
              - not_null
          - name: data
            description: Raw JSON payload serialized as a STRING via json.dumps(). Arrays are unpacked via JSON_QUERY_ARRAY() in staging.
            tests:
              - not_null