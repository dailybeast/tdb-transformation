version: 2

models:
  - name: fct__substack_subscriber_daily
    description: >
      Daily subscriber grain fact table — one row per subscriber per snapshot date.
      Combines Substack subscription identity and status with Stripe billing context.
      Adds computed status_bucket and is_active_paid fields for analytics use.
      Materialized as an incremental table partitioned by snapshot_date.
      Feeds fct__substack_subscriber_compat for backwards-compatible analytics handoff,
      and the Stripe accrual marts for revenue reporting.

    columns:

      # --- Keys & Identity ---
      - name: snapshot_date
        description: UTC timestamp of the Substack snapshot this row belongs to.
        tests:
          - not_null

      - name: publication
        description: Substack publication identifier (e.g. royalist).

      - name: subscription_id
        description: Substack subscription ID. Not globally unique — unique within snapshot_date.
        tests:
          - not_null

      - name: user_id
        description: Substack user account ID.

      - name: email
        description: Subscriber email address.

      # --- Substack Subscription Context ---
      - name: subscription_interval
        description: Substack subscription interval (monthly, annual, lifetime).

      - name: stripe_plan_name
        description: Plan label from the Substack export (e.g. "$7 a month", "$60 a year"). Null for lifetime and some legacy records.

      - name: paid_attribution
        description: Paid acquisition channel attributed by Substack (direct, paywall, ios-app-link, substack-boost, email-checkout, etc.).

      - name: free_attribution
        description: Free acquisition channel attributed by Substack, where available.

      - name: is_subscribed
        description: Boolean. True if the subscriber is currently active per Substack.

      - name: is_comp
        description: Boolean. True if this is a complimentary subscription.

      - name: is_gift
        description: Boolean. True if this subscription was gifted.

      - name: is_free_trial
        description: Boolean. True if this is a free trial subscription.

      - name: activity_rating
        description: Substack engagement score for this subscriber.

      - name: subscription_created_at
        description: Timestamp when the Substack subscription was created.

      - name: first_payment_at
        description: Timestamp of the subscriber's first payment. Null for free and comp subscribers.

      - name: subscription_expires_at
        description: Timestamp when the current subscription period expires.

      - name: unsubscribed_at
        description: Timestamp when the subscriber cancelled. Null if still active.

      # --- Stripe Enrichment ---
      - name: stripe_subscription_id
        description: Matched Stripe subscription ID. Null for non-Stripe paid subscribers (iOS/Android app purchases).

      - name: stripe_status
        description: Stripe subscription status at the time of the latest Fivetran sync (active, canceled, past_due, etc.).

      - name: current_period_start
        description: Start of the current Stripe billing period, sourced from the latest invoice.

      - name: current_period_end
        description: End of the current Stripe billing period, sourced from the latest invoice.

      - name: cancel_at_period_end
        description: Boolean. Whether the Stripe subscription is set to cancel at period end.

      - name: canceled_at
        description: Timestamp when the Stripe subscription was cancelled, if applicable.

      # --- Derived Fields ---
      - name: billing_interval
        description: >
          Resolved billing cadence (annual or monthly). Prefers Stripe invoice-derived
          value; falls back to parsing stripe_plan_name for non-Stripe paid subscribers.

      - name: imputed_price_usd
        description: >
          Dollar amount extracted from stripe_plan_name (e.g. 7.0, 60.0).
          Used as a price proxy for non-Stripe paid subscribers and in the
          backwards-compatible revenue field.

      - name: is_non_stripe_paid
        description: >
          True when first_payment_at is populated but no Stripe subscription was matched.
          Indicates an iOS or Android app store subscriber.

      # --- Computed Buckets ---
      - name: status_bucket
        description: >
          Subscription status as of snapshot_date. Values: Active, Cancelled but Active,
          Expired, Non-paid. Derived from expiration, cancellation, and payment history.

      - name: is_active_paid
        description: >
          True when status_bucket is Active or Cancelled but Active. Indicates a subscriber
          who has paid access at the time of the snapshot.

      - name: payer_type
        description: >
          Payment channel for this subscriber. Values: stripe (direct Stripe billing),
          ios (Apple App Store in-app purchase), comp (complimentary access),
          gift (gifted subscription), free (no payment).
