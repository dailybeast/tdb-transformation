version: 2

models:
  - name: fct__stripe_substack_month_revenue_projections
    description: >
      Revenue projection model for Substack subscriber revenue (monthly and annual billing
      intervals). Does not include App Store rows. Produces two row types per billing interval:
      closed rows for each completed reporting month (actuals + the projection that was
      live at the time), and a single live row for the current in-progress period.

      Projections use an EWMA of revenue deltas over the prior five completed months
      (weights 16/8/4/2/1, most recent first), with an outlier cap: any single month's
      delta exceeding 1.5x the trimmed average of the other four is replaced by that
      trimmed average before being fed into the EWMA. Requires at least five months of
      history; rows with fewer than five prior deltas are excluded.

    columns:
      - name: reporting_month
        description: The reporting period label, formatted as "Month YYYY".
        tests:
          - not_null

      - name: target_start
        description: First day of the reporting period (16th of the prior calendar month).

      - name: target_end
        description: Last day of the reporting period (15th of the reporting month).

      - name: billing_interval
        description: Billing cadence — monthly or annual.
        tests:
          - not_null
          - accepted_values:
              values: ['monthly', 'annual']

      - name: row_type
        description: >
          closed for completed reporting months where actuals are available.
          live for the single current in-progress period.
        tests:
          - not_null
          - accepted_values:
              values: ['closed', 'live']

      - name: pct_period_elapsed
        description: >
          Percentage of the current period that has elapsed as of today.
          Populated for live rows only; null for closed rows.

      - name: recurring_revenue
        description: >
          Recognized revenue from the prior completed reporting month. Represents the
          revenue base carried into this period — i.e. what we would expect to collect
          again if no subscribers started or churned. Used as the baseline for the EWMA
          projection: projected_revenue = recurring_revenue + ewma_delta.

      - name: recurring_subscribers
        description: >
          Subscriber count from the prior completed reporting month. This is the pool
          from which churn is drawn — a subscriber can only churn if they were part of
          this recurring base. Populated for closed rows only; null for live rows.

      - name: starts
        description: >
          New subscription starts in this period — subscribers who had no active
          subscription in the prior period. These are additive to the recurring base.
          For closed rows: actual historical count from int__stripe_substack_subscriptions.
          For live rows: count to date within the current period.

      - name: starts_prorated
        description: >
          Full-period estimate of new starts, prorated from pace to date
          (starts_to_date / elapsed_days * total_days).
          Populated for live rows only; null for closed rows.

      - name: starts_revenue
        description: >
          Recognized revenue attributable to new starts in this period — the charge
          rows whose subscription_created_at falls within this reporting month.
          Populated for closed rows only; null for live rows.

      - name: churn
        description: >
          Cancellations in this period. Churn is a subset of the recurring base —
          these are subscribers counted in recurring_subscribers who cancelled during
          this period. A subscriber cannot churn if they were not already in the
          recurring base. For closed rows: actual historical count. For live rows:
          count to date within the current period.

      - name: churn_prorated
        description: >
          Full-period estimate of churn, prorated from pace to date
          (churn_to_date / elapsed_days * total_days).
          Populated for live rows only; null for closed rows.

      - name: churn_revenue
        description: >
          Recognized revenue lost to churn in this period — the charge rows whose
          subscription canceled_at falls within this reporting month.
          Populated for closed rows only; null for live rows.

      - name: actual_revenue
        description: >
          For closed rows: actual recognized revenue from fct__stripe_substack_month_accrual.
          For live rows: revenue recognized to date in the current period from
          fct__stripe_substack_charge_accrual.

      - name: projected_revenue
        description: >
          Full-period revenue projection. Computed as recurring_revenue plus the
          EWMA delta (with outlier cap) derived from the prior five months.

      - name: pct_of_projection_achieved
        description: >
          For closed rows: (projected_revenue - actual_revenue) / actual_revenue * 100.
          Positive means over-projected; negative means under-projected.
          For live rows: actual_revenue / projected_revenue * 100 — how much of the
          full-month projection has been recognized so far.
