tdb_transformation:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: data-platform-455517
      dataset: tdb_transformation_dev
      keyfile: "{{ env_var('GCP_SA') }}"
      threads: 1
      location: US
      priority: interactive
      timeout_seconds: 300
      retries: 1

    prod:
      type: bigquery
      method: service-account
      project: data-platform-455517
      dataset: tdb_prd
      keyfile: "{{ env_var('GCP_SA') }}"
      threads: 1
      location: US
      priority: interactive
      timeout_seconds: 300
      retries: 1